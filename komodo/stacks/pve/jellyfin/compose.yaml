---
services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=512m
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Dublin
      - JELLYFIN_PublishedServerUrl=https://192.168.1.2:8920 #optional
    volumes:
      - /mnt/storage/appdata/jellyfin:/config
      - /mnt/storage/data/movies:/movies
      - /mnt/storage/data/tv:/tv
      - /mnt/storage/data/videos:/videos
      - /mnt/storage/data/pictures/library/5e7dfe53-e21a-4ab6-bff8-48c43a5e7ab9/:/videoss
    ports:
      - 8096:8096
      - 8920:8920 #optional
      - 7359:7359/udp #optional
      - 1900:1900/udp #optional
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`media.test`)
      - traefik.http.routers.jellyfin.middlewares=local-ip-allowlist
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
      - traefik.http.routers.jellyfin-secure.rule=Host(`${JELLYFIN_URL}`)
      - traefik.http.routers.jellyfin-secure.tls.certresolver=le
    networks:
      - proxy_network

networks:
  proxy_network:
    name: proxy_network
    external: true